<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulmask Management</title>
    <link href="tailwind.min.css" rel="stylesheet">
    <style>
        .terminal {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="login-container" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center">Soulmask Control</h1>
            <input type="password" id="password" placeholder="Admin Password" class="w-full p-2 border border-gray-300 rounded mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden container mx-auto p-4 max-w-4xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Soulmask Dashboard</h1>
            <button onclick="logout()" class="text-red-600 hover:underline">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="text-xl font-semibold mb-4">Container Status</h2>
                <div id="status-info" class="space-y-2">
                    <p>Status: <span id="container-status" class="font-bold">Loading...</span></p>
                    <p>Image: <span id="container-image" class="text-gray-600">-</span></p>
                    <p>ID: <span id="container-id" class="text-gray-600">-</span></p>
                </div>
            </div>

            <div class="bg-white p-6 rounded shadow">
                <h2 class="text-xl font-semibold mb-4">Controls</h2>
                <div class="flex flex-wrap gap-4">
                    <button onclick="action('start')" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 disabled:opacity-50">Start</button>
                    <button onclick="action('stop')" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 disabled:opacity-50">Stop</button>
                    <button onclick="action('restart')" class="bg-yellow-600 text-white px-4 py-2 rounded hover:bg-yellow-700 disabled:opacity-50">Restart</button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Live Logs</h2>
            <div id="terminal" class="terminal mb-4"></div>
            <div class="flex justify-end">
                <button onclick="clearLogs()" class="text-sm text-gray-500 hover:underline">Clear Terminal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
