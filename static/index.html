<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulmask Command Center</title>
    <link href="/static/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0c10;
            color: #e2e8f0;
        }
        .terminal-container {
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            border: 1px solid #1e293b;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-running {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }
        .status-stopped {
            color: #f87171;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.3);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div id="dashboard" class="p-4 md:p-8">
        <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center shadow-lg shadow-green-900/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">SOULMASK<span class="text-green-600">_OPS</span></h1>
                    <p class="text-xs text-gray-500 font-mono uppercase tracking-widest">Command Center v2.0</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div id="connection-status" class="flex items-center gap-2 px-3 py-1 bg-gray-900 rounded-full border border-gray-800">
                    <div class="w-2 h-2 rounded-full bg-gray-700"></div>
                    <span class="text-xs font-medium text-gray-500 uppercase tracking-tighter">Connecting...</span>
                </div>
                <button onclick="logout()" class="text-sm font-bold text-gray-400 hover:text-green-500 transition-colors flex items-center gap-2 group">
                    <span>LOGOUT</span>
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Status & Info -->
            <div class="lg:col-span-1 space-y-8">
                <div class="glass-panel p-6 rounded-3xl shadow-2xl">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Instance Status</h2>
                        <span id="container-status-badge" class="px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-tighter bg-gray-800">Checking...</span>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center text-gray-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-600 uppercase font-bold">Container ID</p>
                                <p id="container-id" class="font-mono text-sm text-gray-400">--------</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center text-gray-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-600 uppercase font-bold">Active Image</p>
                                <p id="container-image" class="text-sm text-gray-400 truncate w-40">--------</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">Operations</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="action('start')" id="btn-start" class="group flex items-center justify-between p-4 bg-gray-800/20 hover:bg-green-600/10 rounded-2xl transition-all border border-transparent hover:border-green-500/20">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-green-500/10 text-green-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-400">Wake Instance</span>
                            </div>
                        </button>

                        <button onclick="action('restart')" id="btn-restart" class="group flex items-center justify-between p-4 bg-gray-800/20 hover:bg-blue-600/10 rounded-2xl transition-all border border-transparent hover:border-blue-500/20">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-500 flex items-center justify-center group-hover:rotate-180 transition-transform duration-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-400">Recycle Process</span>
                            </div>
                        </button>

                        <button onclick="action('stop')" id="btn-stop" class="group flex items-center justify-between p-4 bg-gray-800/20 hover:bg-red-600/10 rounded-2xl transition-all border border-transparent hover:border-red-500/20">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-400">Kill Instance</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Terminal -->
            <div class="lg:col-span-2">
                <div class="terminal-container rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[600px]">
                    <div class="bg-gray-900/50 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1.5 mr-4">
                                <div class="w-3 h-3 rounded-full bg-red-500/10 border border-red-500/20"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/10 border border-yellow-500/20"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/10 border border-green-500/20"></div>
                            </div>
                            <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Uplink_Logs.io</span>
                        </div>
                        <button onclick="clearLogs()" class="text-[10px] font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">Clear Buffer</button>
                    </div>
                    <div id="terminal" class="flex-1 p-6 overflow-y-auto font-mono text-xs leading-relaxed text-gray-500">
                        <div class="text-gray-700 italic">Standby for stream initialization...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
