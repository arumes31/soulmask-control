<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulmask Management</title>
    <link href="tailwind.min.css" rel="stylesheet">
    <style>
        .terminal {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 font-sans">
    <div id="login-container" class="flex flex-col items-center justify-center min-h-screen overflow-hidden relative">
        <!-- Animated Background Particles -->
        <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
            <div class="smoke-particle" style="top: 20%; left: 10%;"></div>
            <div class="smoke-particle" style="top: 50%; left: 80%;"></div>
            <div class="smoke-particle" style="top: 80%; left: 30%;"></div>
        </div>

        <div class="z-10 flex flex-col items-center scale-75 md:scale-100">
            <!-- Animated Skull SVG -->
            <div class="skull-wrapper mb-8">
                <svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg" class="floating-skull">
                    <!-- Main Skull Shape -->
                    <path d="M100 20C60 20 20 50 20 100C20 130 35 150 50 165C50 165 50 190 60 210C65 220 135 220 140 210C150 190 150 165 150 165C165 150 180 130 180 100C180 50 140 20 100 20Z" fill="#E5E7EB" />
                    <!-- Eye Sockets -->
                    <circle cx="65" cy="100" r="22" fill="#111827" class="eye-socket" />
                    <circle cx="135" cy="100" r="22" fill="#111827" class="eye-socket" />
                    <!-- Glowing Eyes -->
                    <circle cx="65" cy="100" r="8" fill="#EF4444" class="glowing-eye" />
                    <circle cx="135" cy="100" r="8" fill="#EF4444" class="glowing-eye" />
                    <!-- Nose -->
                    <path d="M100 130L85 155H115L100 130Z" fill="#111827" />
                    <!-- Teeth/Mouth -->
                    <rect x="75" y="180" width="8" height="25" rx="4" fill="#111827" opacity="0.4" />
                    <rect x="90" y="180" width="8" height="30" rx="4" fill="#111827" opacity="0.4" />
                    <rect x="105" y="180" width="8" height="30" rx="4" fill="#111827" opacity="0.4" />
                    <rect x="120" y="180" width="8" height="25" rx="4" fill="#111827" opacity="0.4" />
                </svg>
            </div>

            <h1 class="text-4xl font-black mb-8 tracking-widest uppercase text-red-600 shadow-sm skull-text">Soulmask Control</h1>
            
            <div id="login-box" class="w-full max-w-sm px-4">
                <input type="password" id="password" placeholder="ENTER ACCESS CODE" 
                    class="w-full bg-gray-800 border-2 border-red-900 focus:border-red-600 text-center p-4 rounded-lg mb-4 outline-none transition-all tracking-[0.5em] placeholder:tracking-normal placeholder:text-gray-600 font-mono">
                <button onclick="login()" 
                    class="w-full bg-red-900 hover:bg-red-700 text-white font-bold p-4 rounded-lg transition-all transform active:scale-95 border-b-4 border-red-950 hover:border-red-900 tracking-widest">
                    AUTHENTICATE
                </button>
            </div>
        </div>
    </div>

    <style>
        .floating-skull {
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.2));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .glowing-eye {
            animation: pulse 2s ease-in-out infinite;
            filter: blur(2px);
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); fill: #EF4444; }
            50% { opacity: 1; transform: scale(1.2); fill: #FF0000; filter: blur(4px) drop-shadow(0 0 10px #FF0000); }
        }
        .skull-text {
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
            letter-spacing: 0.3em;
        }
        .smoke-particle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: wander 20s infinite linear;
        }
        @keyframes wander {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, 50px) scale(1.5); }
            66% { transform: translate(-50px, 100px) scale(0.8); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>

    <div id="dashboard" class="hidden min-h-screen p-4 md:p-8">
        <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">SOULMASK<span class="text-red-600">_OPS</span></h1>
                    <p class="text-xs text-gray-500 font-mono uppercase tracking-widest">Command Center v2.0</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div id="connection-status" class="flex items-center gap-2 px-3 py-1 bg-gray-800 rounded-full border border-gray-700">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs font-medium text-gray-300 uppercase tracking-tighter">Live Stream Active</span>
                </div>
                <button onclick="logout()" class="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors flex items-center gap-2">
                    <span>LOGOUT</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Status & Info -->
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-gray-800/50 backdrop-blur-xl border border-gray-700 p-6 rounded-3xl shadow-2xl">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Instance Status</h2>
                        <span id="container-status-badge" class="px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-tighter bg-gray-700">Checking...</span>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-bold">Container ID</p>
                                <p id="container-id" class="font-mono text-sm text-gray-300">--------</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-bold">Active Image</p>
                                <p id="container-image" class="text-sm text-gray-300 truncate w-40">--------</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-800/50 backdrop-blur-xl border border-gray-700 p-6 rounded-3xl">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">Operations</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="action('start')" id="btn-start" class="group flex items-center justify-between p-4 bg-gray-700/30 hover:bg-green-600/20 rounded-2xl transition-all border border-transparent hover:border-green-500/30">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-green-500/20 text-green-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-300">Wake Instance</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-600 group-hover:text-green-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>

                        <button onclick="action('restart')" id="btn-restart" class="group flex items-center justify-between p-4 bg-gray-700/30 hover:bg-yellow-600/20 rounded-2xl transition-all border border-transparent hover:border-yellow-500/30">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-yellow-500/20 text-yellow-500 flex items-center justify-center group-hover:rotate-180 transition-transform duration-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-300">Recycle Process</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-600 group-hover:text-yellow-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>

                        <button onclick="action('stop')" id="btn-stop" class="group flex items-center justify-between p-4 bg-gray-700/30 hover:bg-red-600/20 rounded-2xl transition-all border border-transparent hover:border-red-500/30">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-red-500/20 text-red-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" /></svg>
                                </div>
                                <span class="text-sm font-bold text-gray-300">Kill Instance</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-600 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Terminal -->
            <div class="lg:col-span-2">
                <div class="bg-black border border-gray-800 rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[600px]">
                    <div class="bg-gray-900 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1.5 mr-4">
                                <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/40"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/40"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/40"></div>
                            </div>
                            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Realtime_Output.log</span>
                        </div>
                        <button onclick="clearLogs()" class="text-[10px] font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">Clear Buffer</button>
                    </div>
                    <div id="terminal" class="flex-1 p-6 overflow-y-auto font-mono text-sm leading-relaxed text-gray-400">
                        <div class="text-gray-600 italic">Initializing stream buffer...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
