<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulmask Access - Authenticate</title>
    <link href="/static/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #05070a;
            background-image: radial-gradient(circle at center, #1a202c 0%, #05070a 100%);
            color: #e2e8f0;
        }
        .tribal-mask {
            filter: drop-shadow(0 0 30px rgba(74, 222, 128, 0.2));
            animation: tribal-float 6s ease-in-out infinite;
        }
        @keyframes tribal-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .glow-pattern {
            fill: #4ade80;
            filter: blur(1px) drop-shadow(0 0 8px #4ade80);
            animation: glow-pulse 3s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .stone-texture {
            fill: #2d3748;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .tribal-input {
            background: rgba(17, 24, 39, 0.8);
            border: 2px solid #2d3748;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .tribal-input:focus {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div id="login-box" class="flex flex-col items-center max-w-md w-full">
        <!-- Tribal Soulmask SVG -->
        <svg width="240" height="280" viewBox="0 0 240 280" class="tribal-mask mb-12" xmlns="http://www.w3.org/2000/svg">
            <!-- Ancient Stone Base -->
            <path d="M120 20C70 20 30 60 30 110C30 160 50 190 70 220L90 260H150L170 220C190 190 210 160 210 110C210 60 170 20 120 20Z" class="stone-texture" />
            
            <!-- Eyes Sockets -->
            <path d="M70 100C70 80 100 80 100 100C100 120 70 120 70 100Z" fill="#0f172a" />
            <path d="M140 100C140 80 170 80 170 100C170 120 140 120 140 100Z" fill="#0f172a" />
            
            <!-- Glowing Eyes -->
            <circle cx="85" cy="100" r="6" class="glow-pattern" />
            <circle cx="155" cy="100" r="6" class="glow-pattern" />
            
            <!-- Tribal Patterns -->
            <path d="M120 40L110 60H130L120 40Z" class="glow-pattern" opacity="0.6" />
            <path d="M60 140Q80 150 100 140" stroke="#4ade80" stroke-width="2" fill="none" class="glow-pattern" opacity="0.4" />
            <path d="M140 140Q160 150 180 140" stroke="#4ade80" stroke-width="2" fill="none" class="glow-pattern" opacity="0.4" />
            
            <!-- Nose / Vertical Line -->
            <rect x="117" y="110" width="6" height="60" rx="3" class="glow-pattern" opacity="0.3" />
            
            <!-- Mouth / Teeth patterns -->
            <path d="M90 200H150V210H90V200Z" fill="#0f172a" />
            <rect x="95" y="200" width="4" height="15" rx="2" class="glow-pattern" opacity="0.5" />
            <rect x="105" y="200" width="4" height="20" rx="2" class="glow-pattern" opacity="0.5" />
            <rect x="118" y="200" width="4" height="22" rx="2" class="glow-pattern" opacity="0.5" />
            <rect x="131" y="200" width="4" height="20" rx="2" class="glow-pattern" opacity="0.5" />
            <rect x="141" y="200" width="4" height="15" rx="2" class="glow-pattern" opacity="0.5" />
        </svg>

        <h1 class="text-3xl font-black text-center mb-2 tracking-[0.2em] uppercase text-green-400">Soulmask</h1>
        <p class="text-xs text-gray-500 mb-8 uppercase tracking-[0.4em] font-mono">Authentication Protocol</p>

        <div class="w-full space-y-4">
            <input type="password" id="password" placeholder="ENTER ACCESS KEY" 
                class="tribal-input w-full p-4 rounded-xl text-center font-mono tracking-widest text-green-300 outline-none transition-all placeholder:text-gray-700 placeholder:tracking-normal">
            
            <button onclick="login()" 
                class="w-full bg-green-900/40 hover:bg-green-700/60 text-green-400 font-bold p-4 rounded-xl border border-green-800/50 transition-all uppercase tracking-widest shadow-lg shadow-green-900/20 active:scale-95">
                Grant Access
            </button>
        </div>
        
        <p id="error-msg" class="mt-6 text-red-500 font-mono text-[10px] uppercase tracking-widest opacity-0 transition-opacity">Access Denied: Invalid Key</p>
    </div>

    <script>
        async function login() {
            const passwordEl = document.getElementById('password');
            const loginBox = document.getElementById('login-box');
            const errorMsg = document.getElementById('error-msg');
            const password = passwordEl.value;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (response.ok) {
                window.location.href = '/';
            } else {
                loginBox.classList.add('shake');
                errorMsg.classList.remove('opacity-0');
                setTimeout(() => {
                    loginBox.classList.remove('shake');
                }, 500);
                passwordEl.value = '';
                setTimeout(() => {
                    errorMsg.classList.add('opacity-0');
                }, 3000);
            }
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
